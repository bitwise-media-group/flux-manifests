# Publish Edge — push every merge to main as the `edge` channel OCI artifact,
# signed keylessly like the release channels. Dev/sandbox clusters syncing
# `edge` validate trunk continuously; `staging` and `stable` still only ever
# see release-tagged artifacts (publish.yaml / promote.yaml).
#
# This is a separate workflow file on purpose: the Fulcio certificate subject
# is the workflow path + ref, so edge artifacts are signed as
# …/flux-manifests/.github/workflows/publish-edge.yaml@refs/heads/main —
# a distinct identity that edge clusters pin, while the release channels'
# verify patches keep matching only publish.yaml@refs/tags/v*. The
# manifest-publisher service account's WIF trust admits this workflow via the
# refs/heads/main subject binding in the artifact-store terraform.
name: Publish Edge Manifests

on:
  push:
    branches: [main]

permissions: {}

# serialise edge publishes so an older commit can never overwrite the tag
# after a newer one; cancel-in-progress stays off so a run is never killed
# between push and sign (an unsigned edge artifact fails cluster verification
# until the next run replaces it)
concurrency:
  group: publish-edge
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # WIF token exchange + cosign keyless both ride the job's OIDC token
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install flux CLI
        uses: fluxcd/flux2/action@6a650dba1b4ae9945185c4bb3cc3f386aaf71b3d # v2.9.2

      - name: install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          # artifact-store module outputs, mirrored as org-level Actions variables
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_MANIFEST_PUBLISHER_SA }}
          token_format: access_token

      - name: push and sign edge
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          PLATFORM_REGISTRY: ${{ vars.PLATFORM_REGISTRY }}
        run: |
          set -euo pipefail
          host="${PLATFORM_REGISTRY%%/*}"
          # writes ~/.docker/config.json — the keychain flux push and cosign both read
          docker login "$host" --username oauth2accesstoken --password-stdin <<<"$ACCESS_TOKEN"

          url="oci://${PLATFORM_REGISTRY}/flux-manifests"

          # no version tag: edge tracks the main head directly, and the
          # revision carries the exact commit for forensics
          digest="$(flux push artifact "$url:edge" \
            --path . \
            --source "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            --revision "main@sha1:$GITHUB_SHA" \
            --output json | jq -r .digest)"

          # keyless: the Fulcio certificate subject is exactly this workflow at
          # refs/heads/main — what edge clusters' FluxInstance verify patch matches.
          # cosign v3 stores the signature as a sigstore bundle via the OCI
          # referrers API; flux >= 2.8 and kyverno's SigstoreBundle rules read
          # that format. --use-signing-config=false only pins the v2 trust
          # services (Fulcio + Rekor v1) — it does not change the format.
          cosign sign --yes --use-signing-config=false \
            "${PLATFORM_REGISTRY}/flux-manifests@$digest"

          {
            echo "## Published flux-manifests edge"
            echo
            echo "- digest: \`$digest\`"
            echo "- revision: \`main@sha1:$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
