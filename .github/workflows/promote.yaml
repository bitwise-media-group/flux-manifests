# Promote — move the `stable` channel tag to an already-published version
# after it has soaked on staging. Gated by the `production` environment
# (required reviewers), whose exact OIDC subject the manifest-publisher
# service account's WIF trust also admits. Retagging moves the channel only;
# the artifact and its signature are untouched (verification follows the
# digest).
name: Promote Manifests

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to promote to stable (e.g. 1.2.3)
        required: true

permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: install flux CLI
        uses: fluxcd/flux2/action@6a650dba1b4ae9945185c4bb3cc3f386aaf71b3d # v2.9.2

      - name: authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_MANIFEST_PUBLISHER_SA }}
          token_format: access_token

      - name: retag stable
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          PLATFORM_REGISTRY: ${{ vars.PLATFORM_REGISTRY }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          host="${PLATFORM_REGISTRY%%/*}"
          # writes ~/.docker/config.json — the keychain the flux CLI reads
          docker login "$host" --username oauth2accesstoken --password-stdin <<<"$ACCESS_TOKEN"

          url="oci://${PLATFORM_REGISTRY}/flux-manifests"
          # sanity: the version must exist (and be pullable) before the channel moves
          flux pull artifact "$url:$VERSION" --output /tmp/artifact > /dev/null
          flux tag artifact "$url:$VERSION" --tag stable

          echo "promoted flux-manifests $VERSION to stable" >> "$GITHUB_STEP_SUMMARY"
