# cert-manager with the Gateway API integration on: it watches Gateways for
# cert-manager.io annotations and issues Certificates into Gateway listener
# secrets. DNS-01 solving reaches Cloud DNS with ambient credentials — the
# controller ServiceAccount (name pinned below) carries a direct Workload
# Identity grant for roles/dns.admin, created by terraform. No GSA annotation.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  inputsFrom:
    - kind: ResourceSetInputProvider
      name: cert-manager
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: cert-manager
        namespace: cert-manager
      spec:
        interval: 1h
        url: oci://${PLATFORM_REGISTRY}/charts/cert-manager
        provider: "${OCI_PROVIDER:=gcp}"
        ref:
          tag: << inputs.tag >>
        verify:
          provider: cosign
          matchOIDCIdentity:
            - issuer: "${SIGNED_IDENTITY_ISSUER}"
              subject: "${SIGNED_IDENTITY_CHARTS}"
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: cert-manager
        namespace: cert-manager
      spec:
        interval: 30m
        timeout: 10m
        chartRef:
          kind: OCIRepository
          name: cert-manager
          namespace: cert-manager
        install:
          crds: CreateReplace
        upgrade:
          crds: CreateReplace
        values:
          crds:
            enabled: true
            # CRDs survive a release uninstall; certificates are not disposable
            keep: true
          image:
            repository: ${CONTAINER_REGISTRY}/images/quay.io/jetstack/cert-manager-controller
          webhook:
            image:
              repository: ${CONTAINER_REGISTRY}/images/quay.io/jetstack/cert-manager-webhook
            nodeSelector:
              role: system
          cainjector:
            image:
              repository: ${CONTAINER_REGISTRY}/images/quay.io/jetstack/cert-manager-cainjector
            nodeSelector:
              role: system
          startupapicheck:
            image:
              repository: ${CONTAINER_REGISTRY}/images/quay.io/jetstack/cert-manager-startupapicheck
          # ACME solver pods are launched by the controller from this image
          # (mirrored via images.extra in flux-containers).
          acmesolver:
            image:
              repository: ${CONTAINER_REGISTRY}/images/quay.io/jetstack/cert-manager-acmesolver
          # The terraform Workload Identity grant binds
          # cert-manager/cert-manager — pin the name so the contract holds.
          serviceAccount:
            name: cert-manager
          nodeSelector:
            role: system
          config:
            apiVersion: controller.config.cert-manager.io/v1alpha1
            kind: ControllerConfiguration
            # watch Gateway API resources (the platform Gateway's listeners)
            enableGatewayAPI: true
          extraArgs:
            # DNS-01 self-checks must use public resolvers: the VPC-internal
            # resolver would answer for private zones and mask propagation.
            - --dns01-recursive-nameservers-only
            - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
