# The Flux status web UI's SSO configuration. flux-operator (bootstrapped by
# terraform, terraform-google-gke-flux) is started with
# --web-config-secret-name=flux-web-auth and hot-reloads the Web Config API
# document from that Secret's config.yaml key. The operator requires the
# OAuth2 clientSecret INLINE in that document -- no file or env indirection
# -- so the whole config.yaml is composed by terraform in the patchy-app
# root (flux-web-auth-config container): the ephemeral random client secret
# is embedded there and never lands in terraform state (write-only version).
# dex's flux-web staticClient reads the same random from the sibling
# dex-client-flux-web container, so the pair cannot drift.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-web-secrets
  namespace: flux-system
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: flux-web-auth
  namespace: flux-system
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/flux-web-auth-config/versions/latest"
        path: "config.yaml"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: flux-web-auth
  namespace: flux-system
spec:
  serviceAccountName: flux-web-secrets
  secretProviderClassName: flux-web-auth
  secretObject:
    type: Opaque
    data:
      - sourcePath: config.yaml
        targetKey: config.yaml
