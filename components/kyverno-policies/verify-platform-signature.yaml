# Every pod image must carry a keyless cosign signature from the platform
# publish workflow, except GKE-managed system images (Google signs and
# delivers those, not the platform pipeline). Image-based exclusion is
# deliberate: GKE system pods appear in kube-system, gmp-system and
# gke-managed-* namespaces, and new managed namespaces appear with cluster
# features — the registries are the stable contract. kube-system itself is
# additionally excluded at the webhook level by the kyverno chart defaults.
#
# Patchy is the one exception to the single-identity model: its images come
# straight from ghcr, signed by goreleaser inside the shared release
# workflow, so a second scoped entry trusts that identity for patchy's
# images ONLY — every image is still verified by exactly one entry. Two
# subtleties on that entry: the Fulcio identity is the REUSABLE workflow's
# job_workflow_ref (github-workflows, not patchy — unlike the chart, which
# patchy's own helm.yaml signs), and cosign v3 stores the signature as a
# sigstore bundle via the OCI referrers API, which only the SigstoreBundle
# verification type can find (the default Cosign type reads legacy .sig
# tags and reports "no signatures found").
#
# failureAction starts as Audit via the cluster var default: soak a fresh
# cluster, audit the PolicyReports, then flip KYVERNO_FAILURE_ACTION=Enforce
# in terraform's flux.cluster_vars — no manifests release needed.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-platform-signature
spec:
  webhookConfiguration:
    failurePolicy: Fail
    timeoutSeconds: 30
  rules:
    - name: verify-platform-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "*"
          skipImageReferences:
            - "gke.gcr.io/*"
            - "gcr.io/gke-release/*"
            - "registry.k8s.io/*"
            # verified by the dedicated patchy entry below
            - "ghcr.io/bitwise-media-group/patchy/*"
          failureAction: "${KYVERNO_FAILURE_ACTION:=Audit}"
          required: true
          # Digest rewriting stays off: kyverno rejects mutateDigest under an
          # Audit failureAction, and failureAction is cluster-var-driven, so
          # the policy must be valid in both modes. verifyDigest follows suit
          # — without the mutation, tag-referenced images carry no digest and
          # would fail that check spuriously. What is verified is the cosign
          # signature on whatever the tag resolves to at admission.
          mutateDigest: false
          verifyDigest: false
          attestors:
            - count: 1
              entries:
                - keyless:
                    subjectRegExp: "${SIGNED_IDENTITY_IMAGES}"
                    issuerRegExp: "${SIGNED_IDENTITY_ISSUER}"
                    rekor:
                      # public Rekor — the platform signs with tlog upload on
                      url: https://rekor.sigstore.dev
        - imageReferences:
            - "ghcr.io/bitwise-media-group/patchy/*"
          # cosign v3 bundles attached via the OCI referrers API
          type: SigstoreBundle
          failureAction: "${KYVERNO_FAILURE_ACTION:=Audit}"
          required: true
          # off for the same Audit-compatibility reason as the entry above
          mutateDigest: false
          verifyDigest: false
          attestors:
            - count: 1
              entries:
                - keyless:
                    # the reusable release workflow's identity (goreleaser
                    # signs inside it) — NOT the patchy repo's, which signs
                    # only the chart (components/patchy/resourceset.yaml)
                    subjectRegExp: '${SIGNED_IDENTITY_PATCHY_IMAGES:=^https://github\.com/bitwise-media-group/github-workflows/}'
                    issuerRegExp: "${SIGNED_IDENTITY_ISSUER}"
                    # the reusable workflow signs for every repo that calls
                    # it; the Fulcio githubWorkflowRepository extension pins
                    # this trust to releases cut FROM the patchy repo
                    additionalExtensions:
                      githubWorkflowRepository: bitwise-media-group/patchy
                    # no rekor block: the bundle embeds its tlog entry and
                    # kyverno checks it against the sigstore TUF trust root
