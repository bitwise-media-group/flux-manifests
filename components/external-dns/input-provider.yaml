apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: external-dns
  namespace: external-dns
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 30m
spec:
  type: GARArtifactTag
  url: oci://${PLATFORM_REGISTRY}/charts/external-dns
  filter:
    # Constraint order matters: kustomize drops the quotes, so the default
    # must not start with '>' or YAML reads it as a folded block scalar.
    semver: "${EXTERNAL_DNS_SEMVER:=<2.0.0 >=1.15.0}"
    limit: 1
