# external-dns publishes records for the platform Gateway's HTTPRoutes (the
# patchy webhook host) into the delegated Cloud DNS zone. Cloud DNS access is
# ambient: the pinned ServiceAccount name carries a direct Workload Identity
# grant for roles/dns.admin, created by terraform. Records are owned per
# cluster (txtOwnerId) and policy=sync prunes records for deleted routes —
# which is what makes cluster destroy/recreate land on the same domain with
# no manual DNS action.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: external-dns
  namespace: external-dns
spec:
  inputsFrom:
    - kind: ResourceSetInputProvider
      name: external-dns
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: external-dns
        namespace: external-dns
      spec:
        interval: 1h
        url: oci://${PLATFORM_REGISTRY}/charts/external-dns
        provider: "${OCI_PROVIDER:=gcp}"
        ref:
          tag: << inputs.tag >>
        verify:
          provider: cosign
          matchOIDCIdentity:
            - issuer: "${SIGNED_IDENTITY_ISSUER}"
              subject: "${SIGNED_IDENTITY_CHARTS}"
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: external-dns
        namespace: external-dns
      spec:
        interval: 30m
        timeout: 5m
        chartRef:
          kind: OCIRepository
          name: external-dns
          namespace: external-dns
        values:
          image:
            repository: ${CONTAINER_REGISTRY}/images/registry.k8s.io/external-dns/external-dns
          provider:
            name: google
          extraArgs:
            - --google-project=${GCP_PROJECT}
            - --google-zone-visibility=public
            - --zone-id-filter=${DNS_ZONE_NAME}
          # Only the delegated zone's domain is ever touched.
          domainFilters:
            - ${DNS_DOMAIN}
          # Gateway API HTTPRoutes (patchy's webhook route) and Services.
          sources:
            - service
            - gateway-httproute
          # Per-cluster record ownership; sync (not upsert-only) prunes records
          # when routes go away, so recreation converges cleanly.
          txtOwnerId: ${CLUSTER_NAME}
          policy: sync
          # The terraform Workload Identity grant binds
          # external-dns/external-dns — pin the name so the contract holds.
          serviceAccount:
            name: external-dns
          nodeSelector:
            role: system
