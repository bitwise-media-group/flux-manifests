# The platform's shared internet-facing Gateway: a Google-managed global
# external Application Load Balancer (no ingress controller pods). It attaches
# the terraform-reserved global static IP by name, so cluster destroy/recreate
# serves the same address — DNS barely blips even before external-dns
# reconverges. Patchy's webhook HTTPRoute attaches to the https listener from
# the patchy namespace (webhook.httpRoute.parentRefs in its chart).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform
  namespace: gateway
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    # NamedAddress is the GKE mechanism for a pre-reserved global static IP.
    - type: NamedAddress
      value: ${GATEWAY_ADDRESS_NAME}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "${PATCHY_DOMAIN}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: patchy-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: patchy
