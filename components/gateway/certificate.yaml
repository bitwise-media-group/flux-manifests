# The certificate for every platform hostname — patchy's webhook (machine)
# edge and status page (human) edge, the dex OIDC issuer, and the Flux
# status web UI — issued by Let's Encrypt via DNS-01 into the secret all
# Gateway listeners terminate with. Fully declarative: on cluster recreation
# cert-manager re-issues into the same secret name and the listeners come
# back serving valid TLS with no manual action.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: patchy-tls
  namespace: gateway
spec:
  secretName: patchy-tls
  dnsNames:
    - integrations.${PATCHY_DOMAIN}
    - status.${PATCHY_DOMAIN}
    - dex.${PATCHY_DOMAIN}
    - flux.${PATCHY_DOMAIN}
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
