# GCP Secret Manager -> the dex-env Secret, following the patchy
# secret-sync pattern. Two kinds of credential ride in one Secret, exposed
# to dex as environment variables (dex expands $VAR in its config and reads
# staticClient secrets via secretEnv):
#
#   - dex-google-*: the Google OAuth app the google connector signs users
#     in with, plus the Workspace admin the directory reads impersonate.
#     Created out of band (an OAuth client cannot be terraformed), versions
#     added with `gcloud secrets versions add`; containers and accessor
#     grants live in the cloud-accounts patchy root (secrets.tf).
#   - dex-client-*: per-relying-party OAuth2 client secrets, generated by
#     terraform (ephemeral random_password, write-only versions) in the
#     patchy-app root beside the cluster. The same containers are synced
#     into the consumer namespaces (flux-system, patchy), so dex and its
#     clients always agree.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dex-secrets
  namespace: dex
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dex-env
  namespace: dex
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/dex-google-client-id/versions/latest"
        path: "google-client-id"
      - resourceName: "projects/${GCP_PROJECT}/secrets/dex-google-client-secret/versions/latest"
        path: "google-client-secret"
      - resourceName: "projects/${GCP_PROJECT}/secrets/dex-google-admin-email/versions/latest"
        path: "google-admin-email"
      - resourceName: "projects/${GCP_PROJECT}/secrets/dex-client-flux-web/versions/latest"
        path: "client-flux-web"
      - resourceName: "projects/${GCP_PROJECT}/secrets/dex-client-patchy-status/versions/latest"
        path: "client-patchy-status"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: dex-env
  namespace: dex
spec:
  serviceAccountName: dex-secrets
  secretProviderClassName: dex-env
  secretObject:
    type: Opaque
    data:
      - sourcePath: google-client-id
        targetKey: GOOGLE_CLIENT_ID
      - sourcePath: google-client-secret
        targetKey: GOOGLE_CLIENT_SECRET
      - sourcePath: google-admin-email
        targetKey: GOOGLE_ADMIN_EMAIL
      - sourcePath: client-flux-web
        targetKey: DEX_CLIENT_FLUX_WEB
      - sourcePath: client-patchy-status
        targetKey: DEX_CLIENT_PATCHY_STATUS
