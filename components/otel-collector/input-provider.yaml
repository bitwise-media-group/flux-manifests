apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: otel-collector
  namespace: otel-collector
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 30m
spec:
  type: GARArtifactTag
  url: oci://${PLATFORM_REGISTRY}/charts/opentelemetry-collector
  filter:
    # Constraint order matters: kustomize drops the quotes, so the default
    # must not start with '>' or YAML reads it as a folded block scalar.
    semver: "${OTEL_SEMVER:=<1.0.0 >=0.130.0}"
    limit: 1
