# The status page's OIDC sign-in against the platform dex, synced only when
# dex is elected in STACK_COMPONENTS — on a dex-less cluster terraform
# creates neither container and the status server runs rollups-only (see
# statusServer.auth in resourceset.yaml). Unlike the out-of-band
# credentials in secret-sync.yaml, both containers are terraform-authored
# in the patchy-app root: patchy-status-auth-config is the (secretless)
# auth config.yaml whose clientSecretFile points at the sibling key, and
# dex-client-patchy-status is the ephemeral-random client secret shared
# with dex's staticClient -- one Secret Manager version feeds both sides,
# so they cannot drift.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: patchy-secrets
  namespace: patchy
spec:
  inputs:
    - components: "${STACK_COMPONENTS:=dex,flux-web,patchy}"
  resourcesTemplate: |
    << if has "dex" (splitList "," inputs.components) >>
    ---
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: patchy-status-auth
      namespace: patchy
    spec:
      provider: gke
      parameters:
        secrets: |
          - resourceName: "projects/${GCP_PROJECT}/secrets/${SECRET_PREFIX}patchy-status-auth-config/versions/latest"
            path: "config.yaml"
          - resourceName: "projects/${GCP_PROJECT}/secrets/${SECRET_PREFIX}dex-client-patchy-status/versions/latest"
            path: "client-secret"
    ---
    apiVersion: secret-sync.gke.io/v1
    kind: SecretSync
    metadata:
      name: patchy-status-auth
      namespace: patchy
    spec:
      serviceAccountName: patchy-secrets
      secretProviderClassName: patchy-status-auth
      secretObject:
        type: Opaque
        data:
          - sourcePath: config.yaml
            targetKey: config.yaml
          - sourcePath: client-secret
            targetKey: client-secret
    << end >>
