# Patchy itself: two charts pulled straight from ghcr (generic provider,
# anonymous) and cosign keyless-verified against the patchy repo's own
# publish identity -- unlike the platform components, which ride the
# flux-containers mirror. The patchy chart carries the CRDs and controllers;
# patchy-config carries the Integration/Forge CRs, split into its own release
# (upstream 0.5.0) because Helm validates every manifest against the API
# server before applying anything -- a single release can never install a CRD
# and a CR of that CRD on first install. Both charts version in lockstep, so
# one input provider tag drives both. The two Secrets consumed (patchy-github,
# patchy-anthropic) are synced in secret-sync.yaml; the mocked CMDB rides in
# via a postRenderer because the chart has no extraVolumes knob.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: patchy
  namespace: patchy
spec:
  inputsFrom:
    - kind: ResourceSetInputProvider
      name: patchy
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: patchy
        namespace: patchy
      spec:
        interval: 1h
        url: oci://ghcr.io/bitwise-media-group/patchy/charts/patchy
        provider: generic
        ref:
          tag: << inputs.tag >>
        verify:
          provider: cosign
          matchOIDCIdentity:
            - issuer: "${SIGNED_IDENTITY_ISSUER}"
              # the chart is signed by patchy's own helm.yaml workflow; the
              # IMAGES are signed by the shared release workflow and carry a
              # different identity (SIGNED_IDENTITY_PATCHY_IMAGES in
              # components/kyverno-policies/verify-platform-signature.yaml)
              subject: '${SIGNED_IDENTITY_PATCHY:=^https://github\.com/bitwise-media-group/patchy/}'
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: patchy
        namespace: patchy
      spec:
        interval: 30m
        timeout: 10m
        chartRef:
          kind: OCIRepository
          name: patchy
          namespace: patchy
        values:
          webhook:
            # the machine edge: GitHub delivers to the integration-controller
            # on its own hostname; the platform Gateway's https-integrations
            # listener terminates TLS for it and admits routes from this
            # namespace
            host: integrations.${PATCHY_DOMAIN}
            httpRoute:
              enabled: true
              parentRefs:
                - name: platform
                  namespace: gateway
                  sectionName: https-integrations
          anthropic:
            # the synced Secret holds a `claude setup-token` OAuth token,
            # not an API key
            secretEnv: CLAUDE_CODE_OAUTH_TOKEN
          config:
            # demo visibility across every controller (the binaries default
            # to warn, which makes a healthy cluster look silent); revisit
            # once the demo settles
            logLevel: debug
          agent:
            # terraform pre-creates patchy-agents; this component's
            # namespace.yaml carries the restricted Pod Security labels the
            # chart would otherwise stamp
            createNamespace: false
          # The controllers are small always-on singletons -> the system
          # pool; agent Jobs carry no selector and ride node
          # auto-provisioning.
          integrationController:
            nodeSelector:
              role: system
          sourceController:
            nodeSelector:
              role: system
          contextController:
            nodeSelector:
              role: system
            config:
              extra:
                # the mocked CMDB (static-context.yaml), mounted by the
                # postRenderer below
                PATCHY_STATIC_CONTEXT_FILE: /etc/patchy/context/cmdb.yaml
          investigationController:
            nodeSelector:
              role: system
          remediationController:
            nodeSelector:
              role: system
          statusServer:
            # the human edge, deliberately a separate hostname from the
            # webhook's: this one authenticates people, that one HMAC-signed
            # machines. OIDC sign-in through the platform dex (the synced
            # patchy-status-auth Secret carries config.yaml plus the
            # client-secret key its clientSecretFile points at) opens the
            # findings board. Without dex in STACK_COMPONENTS the secret is
            # never synced (resourceset-secrets.yaml) and an empty
            # existingSecret drops the server to its rollups-only posture:
            # public statistics, no findings, no sign-in.
            auth:
              existingSecret: << ternary "patchy-status-auth" "" (has "dex" (splitList "," "${STACK_COMPONENTS:=dex,flux-web,patchy}")) | quote >>
            host: status.${PATCHY_DOMAIN}
            httpRoute:
              # the human edge only exists when dex can authenticate humans;
              # a dex-less cluster keeps the status server in-cluster only
              # (kubectl port-forward to reach). The webhook route above is
              # unaffected -- machines authenticate by HMAC, not SSO.
              enabled: << has "dex" (splitList "," "${STACK_COMPONENTS:=dex,flux-web,patchy}") >>
              parentRefs:
                - name: platform
                  namespace: gateway
                  sectionName: https-status
            nodeSelector:
              role: system
            rbac:
              # render the chart's user-tier ClusterRoles (findings-viewer/
              # approver/operator/admin); the rbac component binds the Google
              # Groups from RBAC_GROUP_* onto them
              userRoles: true
        # The chart has no extraVolumes knob, so the mocked CMDB is mounted
        # by patching the rendered context-controller Deployment.
        postRenderers:
          - kustomize:
              patches:
                - target:
                    kind: Deployment
                    name: patchy-context-controller
                  patch: |
                    - op: add
                      path: /spec/template/spec/volumes/-
                      value:
                        name: static-context
                        configMap:
                          name: patchy-static-context
                    - op: add
                      path: /spec/template/spec/containers/0/volumeMounts/-
                      value:
                        name: static-context
                        mountPath: /etc/patchy/context
                        readOnly: true
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: patchy-config
        namespace: patchy
      spec:
        interval: 1h
        url: oci://ghcr.io/bitwise-media-group/patchy/charts/patchy-config
        provider: generic
        ref:
          # lockstep with the patchy chart: release-please stamps both charts
          # with the app version, so the one provider tag fits both
          tag: << inputs.tag >>
        verify:
          provider: cosign
          matchOIDCIdentity:
            # same helm.yaml workflow signs both charts
            - issuer: "${SIGNED_IDENTITY_ISSUER}"
              subject: '${SIGNED_IDENTITY_PATCHY:=^https://github\.com/bitwise-media-group/patchy/}'
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: patchy-config
        namespace: patchy
      spec:
        interval: 30m
        timeout: 5m
        # the CRs cannot even be validated until the patchy release has
        # installed the CRDs; helm-controller holds this release until the
        # patchy HelmRelease is Ready
        dependsOn:
          - name: patchy
        chartRef:
          kind: OCIRepository
          name: patchy-config
          namespace: patchy
        values:
          # The pipeline switch-on: the controllers idle until an Integration
          # (findings in, tracking issues out) and a Forge (repository
          # clone/push) exist. Both reference the one synced patchy-github
          # Secret (secret-sync.yaml) — a single GitHub App serves read and
          # write.
          integrations:
            - name: github
              spec:
                provider: github
                secretRef:
                  name: patchy-github
                interval: 10m
                github:
                  issues:
                    enabled: true
                    approveComment: /approve
                  codeScanningAlerts:
                    enabled: true
          forges:
            - name: github
              spec:
                provider: github
                secretRef:
                  name: patchy-github
                interval: 10m
