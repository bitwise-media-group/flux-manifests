# GCP Secret Manager -> Kubernetes Secrets via GKE Integrated Secret
# Synchronization (enabled by the gke module's secret_sync toggle). Each
# SecretSync materialises a Secret named after itself, carrying exactly the
# names and keys the patchy chart hardcodes. The patchy-secrets KSAs hold
# direct Workload Identity grants (roles/secretmanager.secretAccessor)
# created in the cloud-accounts patchy root beside the secret containers;
# the secret VERSIONS are added out of band and never touch terraform state.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patchy-secrets
  namespace: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patchy-secrets
  namespace: patchy-agents
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: patchy-github-app
  namespace: patchy
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/patchy-github-app-id/versions/latest"
        path: "app-id"
      - resourceName: "projects/${GCP_PROJECT}/secrets/patchy-github-app-private-key/versions/latest"
        path: "private-key.pem"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: patchy-github-app
  namespace: patchy
spec:
  serviceAccountName: patchy-secrets
  secretProviderClassName: patchy-github-app
  secretObject:
    type: Opaque
    data:
      - sourcePath: app-id
        targetKey: app-id
      - sourcePath: private-key.pem
        targetKey: private-key.pem
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: patchy-webhook-secret
  namespace: patchy
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/patchy-webhook-secret/versions/latest"
        path: "secret"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: patchy-webhook-secret
  namespace: patchy
spec:
  serviceAccountName: patchy-secrets
  secretProviderClassName: patchy-webhook-secret
  secretObject:
    type: Opaque
    data:
      - sourcePath: secret
        targetKey: secret
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: patchy-anthropic
  namespace: patchy-agents
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/patchy-anthropic-token/versions/latest"
        path: "api-key"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: patchy-anthropic
  namespace: patchy-agents
spec:
  serviceAccountName: patchy-secrets
  secretProviderClassName: patchy-anthropic
  secretObject:
    type: Opaque
    data:
      - sourcePath: api-key
        targetKey: api-key
