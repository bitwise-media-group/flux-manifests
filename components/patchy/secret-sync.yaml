# GCP Secret Manager -> Kubernetes Secrets via GKE Integrated Secret
# Synchronization (enabled by the gke module's secret_sync toggle). Each
# SecretSync materialises a Secret named after itself, carrying exactly the
# names and keys the patchy chart hardcodes. The patchy-secrets KSAs hold
# direct Workload Identity grants (roles/secretmanager.secretAccessor)
# created in the cloud-accounts patchy root beside the secret containers;
# the secret VERSIONS are added out of band and never touch terraform state.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patchy-secrets
  namespace: patchy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patchy-secrets
  namespace: patchy-agents
---
# One GitHub credential Secret, referenced by the Integration CR (webhook
# validation + issue projection + alert ingestion) and the Forge CR
# (repository clone/push) alike. The key names appID / privateKey /
# webhookSecret are patchy's contract (internal/ghsecret); the three Secret
# Manager containers stay as terraform created them.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: patchy-github
  namespace: patchy
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/${SECRET_PREFIX}patchy-github-app-id/versions/latest"
        path: "app-id"
      - resourceName: "projects/${GCP_PROJECT}/secrets/${SECRET_PREFIX}patchy-github-app-private-key/versions/latest"
        path: "private-key.pem"
      - resourceName: "projects/${GCP_PROJECT}/secrets/${SECRET_PREFIX}patchy-webhook-secret/versions/latest"
        path: "webhook-secret"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: patchy-github
  namespace: patchy
spec:
  serviceAccountName: patchy-secrets
  secretProviderClassName: patchy-github
  secretObject:
    type: Opaque
    data:
      - sourcePath: app-id
        targetKey: appID
      - sourcePath: private-key.pem
        targetKey: privateKey
      - sourcePath: webhook-secret
        targetKey: webhookSecret
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: patchy-anthropic
  namespace: patchy-agents
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${GCP_PROJECT}/secrets/${SECRET_PREFIX}patchy-anthropic-token/versions/latest"
        path: "api-key"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: patchy-anthropic
  namespace: patchy-agents
spec:
  serviceAccountName: patchy-secrets
  secretProviderClassName: patchy-anthropic
  secretObject:
    type: Opaque
    data:
      - sourcePath: api-key
        targetKey: api-key
