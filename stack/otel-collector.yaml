apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: otel-collector
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 5m
  wait: true
  prune: true
  dependsOn:
    - name: kyverno-policies
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: ./components/otel-collector
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
