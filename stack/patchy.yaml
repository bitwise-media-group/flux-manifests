apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: patchy
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  # 10m rather than the workload default 5m: the first install also waits on
  # the SecretSyncs materialising the chart's Secrets; the retry loop absorbs
  # any remaining race.
  timeout: 10m
  wait: true
  prune: true
  # kyverno-policies: image verification (including the patchy attestor)
  # must be live before pods admit. gateway: the webhook HTTPRoute attaches
  # to the platform Gateway's https listener.
  dependsOn:
    - name: kyverno-policies
    - name: gateway
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: ./components/patchy
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
