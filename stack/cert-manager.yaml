apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 10m
  wait: true
  prune: true
  # Pod-image signature verification must be live before workloads admit pods.
  dependsOn:
    - name: kyverno-policies
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: ./components/cert-manager
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
