apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 5m
  wait: true
  prune: true
  # The Certificate needs the cert-manager CRDs and the letsencrypt
  # ClusterIssuers. external-dns is deliberately NOT a dependency: DNS-01
  # needs no A record, and record creation is eventually consistent.
  dependsOn:
    - name: cert-manager-issuers
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: ./components/gateway
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
