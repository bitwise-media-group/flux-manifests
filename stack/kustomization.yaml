apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # flux managing flux: the operator + FluxInstance HelmReleases (adopted
  # from the terraform bootstrap) follow the newest mirrored charts
  - flux.yaml
  - kyverno.yaml
  - kyverno-policies.yaml
  - cert-manager.yaml
  - cert-manager-issuers.yaml
  - external-dns.yaml
  - gateway.yaml
  - rbac.yaml
  # the optional tier (dex, flux-web, patchy) — elected via STACK_COMPONENTS
  - optional.yaml
  # - otel-collector.yaml
