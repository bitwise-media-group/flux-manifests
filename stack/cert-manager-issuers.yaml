apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 5m
  wait: true
  prune: true
  # Split from cert-manager so the ClusterIssuers are never applied before the
  # CRDs (and the webhook that validates them) exist.
  dependsOn:
    - name: cert-manager
  sourceRef:
    kind: OCIRepository
    name: flux-system
  path: ./components/cert-manager-issuers
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
